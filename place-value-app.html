<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>十進位積木教具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #f4f2ed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #app { padding: 14px; max-width: 700px; margin: 0 auto; user-select: none; }

  .mode-bar { display: flex; gap: 8px; margin-bottom: 14px; }
  .mode-btn {
    flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #ccc;
    background: #f0ede6; font-size: 16px; font-weight: 700; cursor: pointer;
    color: #555; transition: all .15s;
  }
  .mode-btn.active { background: #1e4d8c; color: #fff; border-color: #1e4d8c; }

  /*
    比例系統：
    block-one  高 32px，欄間距 4px  → 每格佔 36px
    block-ten  高 = 10×32 + 9×4 = 356px（剛好等於十個方塊疊起來）
    寬度統一 32px
  */
  .blocks-area {
    background: #fff; border: 1.5px solid #ddd; border-radius: 14px;
    padding: 14px 14px 12px; min-height: 390px;
    display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .block-ten {
    width: 32px; height: 356px;
    background: #1e4d8c; border-radius: 5px; flex-shrink: 0;
    display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px;
  }
  .block-ten span { color: #b5d4f4; font-size: 11px; font-weight: 800; }
  .block-one {
    width: 32px; height: 32px;
    background: #f4691b; border-radius: 4px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .block-one span { color: #fff; font-size: 10px; font-weight: 800; }
  .ones-col { display: flex; flex-direction: column; gap: 4px; align-items: center; justify-content: flex-end; }

  .prompt-box { text-align: center; padding: 10px 8px 4px; font-size: 20px; font-weight: 700; color: #1e4d8c; min-height: 44px; }
  .status-bar { text-align: center; font-size: 14px; color: #666; margin-bottom: 6px; min-height: 22px; }

  .teacher-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .teacher-row label { font-size: 15px; color: #444; white-space: nowrap; }
  .teacher-input {
    width: 80px; padding: 9px; border-radius: 9px; border: 1.5px solid #bbb;
    font-size: 22px; font-weight: 700; text-align: center; color: #1e4d8c; background: #fff;
  }
  .set-btn {
    padding: 10px 20px; background: #1e4d8c; color: #fff; border: none;
    border-radius: 9px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .set-btn:active { background: #0c447c; }

  .keypad-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .keypad-section { flex: 1; }
  .keypad-label {
    text-align: center; font-size: 13px; font-weight: 700;
    margin-bottom: 6px; padding: 5px 0; border-radius: 7px;
  }
  .klabel-blue { background: #e6f1fb; color: #0c447c; }
  .klabel-orange { background: #fff0e8; color: #b03800; }
  .keys-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .key {
    padding: 14px 4px; border-radius: 10px; border: none;
    font-size: 20px; font-weight: 800; cursor: pointer;
    transition: transform .1s; touch-action: manipulation;
  }
  .key:active { transform: scale(.91); }
  .key-blue { background: #1e4d8c; color: #fff; }
  .key-blue.sel { background: #0c447c; outline: 3px solid #f4691b; outline-offset: 1px; }
  .key-orange { background: #f4691b; color: #fff; }
  .key-orange.sel { background: #b03800; outline: 3px solid #1e4d8c; outline-offset: 1px; }

  .answer-display { text-align: center; margin: 8px 0 6px; min-height: 48px; }
  .answer-display .num { font-size: 42px; font-weight: 900; color: #1e4d8c; }
  .answer-display .num .ones-num { color: #f4691b; }

  .feedback { text-align: center; font-size: 18px; font-weight: 700; min-height: 30px; padding: 4px 0; }
  .fb-wrong { color: #a32d2d; }
  .fb-right { color: #0f6e56; }

  .ok-btn {
    display: block; width: 100%; padding: 16px;
    background: #27500a; color: #fff; border: none;
    border-radius: 12px; font-size: 22px; font-weight: 800;
    cursor: pointer; margin-top: 4px;
  }
  .ok-btn:active { background: #3b6d11; }
  .ok-btn:disabled { background: #aaa; cursor: default; }

  .quiz-setup { padding: 8px 0; }
  .quiz-setup p { text-align: center; font-size: 16px; color: #444; margin-bottom: 12px; }
  .goal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .goal-btn {
    padding: 16px 4px; border-radius: 12px; border: 2px solid #ddd;
    background: #f0ede6; font-size: 26px; font-weight: 900; cursor: pointer; color: #333;
  }
  .goal-btn.sel { background: #1e4d8c; color: #fff; border-color: #1e4d8c; }
  .start-btn {
    display: block; width: 100%; padding: 16px; background: #1e4d8c; color: #fff;
    border: none; border-radius: 12px; font-size: 20px; font-weight: 800; cursor: pointer;
  }
  .start-btn:active { background: #0c447c; }

  .prog-bar-wrap { background: #e6f1fb; border-radius: 8px; height: 12px; margin-bottom: 10px; }
  .prog-bar { background: #1e4d8c; height: 12px; border-radius: 8px; transition: width .4s; }

  .score-box { text-align: center; padding: 30px 10px; }
  .score-box .big { font-size: 60px; font-weight: 900; color: #1e4d8c; }
  .score-box .star { font-size: 48px; margin-bottom: 8px; }
  .score-box p { font-size: 18px; color: #444; margin-top: 10px; }
  .restart-btn {
    display: inline-block; margin-top: 20px; padding: 14px 40px;
    background: #1e4d8c; color: #fff; border: none; border-radius: 12px;
    font-size: 18px; font-weight: 800; cursor: pointer;
  }
  .restart-btn:active { background: #0c447c; }
</style>
</head>
<body>
<div id="app">

  <div class="mode-bar">
    <button class="mode-btn active" id="btn-free" onclick="setMode('free')">老師出題</button>
    <button class="mode-btn" id="btn-quiz" onclick="setMode('quiz')">測驗模式</button>
  </div>

  <div id="panel-free">
    <div class="teacher-row">
      <label>輸入數字：</label>
      <input class="teacher-input" type="number" id="teacher-num" min="1" max="99" placeholder="1-99">
      <button class="set-btn" onclick="setTeacherNum()">出題</button>
    </div>
    <div class="prompt-box" id="free-prompt"></div>
    <div class="blocks-area" id="free-blocks"></div>
    <div class="keypad-row">
      <div class="keypad-section">
        <div class="keypad-label klabel-blue">十位數</div>
        <div class="keys-grid" id="keys-tens"></div>
      </div>
      <div class="keypad-section">
        <div class="keypad-label klabel-orange">個位數</div>
        <div class="keys-grid" id="keys-ones"></div>
      </div>
    </div>
    <div class="answer-display" id="free-answer"></div>
    <div class="feedback" id="free-feedback"></div>
  </div>

  <div id="panel-quiz" style="display:none">

    <div id="quiz-setup-view" class="quiz-setup">
      <p>選擇要答對幾題才結束：</p>
      <div class="goal-grid">
        <button class="goal-btn sel" onclick="selectGoal(5,this)">5</button>
        <button class="goal-btn" onclick="selectGoal(10,this)">10</button>
        <button class="goal-btn" onclick="selectGoal(15,this)">15</button>
        <button class="goal-btn" onclick="selectGoal(20,this)">20</button>
      </div>
      <button class="start-btn" onclick="startQuiz()">開始測驗</button>
    </div>

    <div id="quiz-game-view" style="display:none">
      <div class="status-bar" id="quiz-status"></div>
      <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
      <div class="blocks-area" id="quiz-blocks"></div>
      <div class="keypad-row">
        <div class="keypad-section">
          <div class="keypad-label klabel-blue">十位數</div>
          <div class="keys-grid" id="qkeys-tens"></div>
        </div>
        <div class="keypad-section">
          <div class="keypad-label klabel-orange">個位數</div>
          <div class="keys-grid" id="qkeys-ones"></div>
        </div>
      </div>
      <div class="answer-display" id="quiz-answer"></div>
      <div class="feedback" id="quiz-feedback"></div>
      <button class="ok-btn" id="ok-btn" onclick="checkAnswer()">OK</button>
    </div>

    <div id="quiz-done-view" style="display:none" class="score-box">
      <div class="star">★</div>
      <div class="big" id="done-score"></div>
      <p id="done-msg"></p>
      <button class="restart-btn" onclick="resetQuiz()">再玩一次</button>
    </div>

  </div>
</div>

<script>
var mode = 'free';
var freeTens = null, freeOnes = null;
var quizTens = null, quizOnes = null;
var quizGoal = 5, quizCorrect = 0, quizTarget = 0;
var freeTarget = null;

function setMode(m) {
  mode = m;
  document.getElementById('btn-free').className = 'mode-btn' + (m === 'free' ? ' active' : '');
  document.getElementById('btn-quiz').className = 'mode-btn' + (m === 'quiz' ? ' active' : '');
  document.getElementById('panel-free').style.display = m === 'free' ? '' : 'none';
  document.getElementById('panel-quiz').style.display = m === 'quiz' ? '' : 'none';
}

function buildKeys(containerId, type) {
  var el = document.getElementById(containerId);
  el.innerHTML = '';
  for (var i = 0; i <= 9; i++) {
    (function(n) {
      var b = document.createElement('button');
      b.className = 'key ' + (type === 'tens' ? 'key-blue' : 'key-orange');
      b.textContent = n;
      b.onclick = function() { keyPress(type, n, containerId); };
      el.appendChild(b);
    })(i);
  }
}

function keyPress(type, n, containerId) {
  var isQuiz = containerId.startsWith('q');
  if (type === 'tens') {
    if (isQuiz) { quizTens = n; updateQuizAnswer(); }
    else { freeTens = n; updateFreeAnswer(); }
  } else {
    if (isQuiz) { quizOnes = n; updateQuizAnswer(); }
    else { freeOnes = n; updateFreeAnswer(); }
  }
  var kids = document.getElementById(containerId).children;
  for (var i = 0; i < kids.length; i++) { kids[i].className = kids[i].className.replace(' sel', ''); }
  kids[n].className += ' sel';
}

function renderBlocks(containerId, tens, ones) {
  var el = document.getElementById(containerId);
  el.innerHTML = '';
  for (var i = 0; i < tens; i++) {
    var d = document.createElement('div');
    d.className = 'block-ten';
    var s = document.createElement('span');
    s.textContent = '10';
    d.appendChild(s);
    el.appendChild(d);
  }
  if (ones > 0) {
    var col = document.createElement('div');
    col.className = 'ones-col';
    for (var j = 0; j < ones; j++) {
      var d2 = document.createElement('div');
      d2.className = 'block-one';
      var s2 = document.createElement('span');
      s2.textContent = '1';
      d2.appendChild(s2);
      col.appendChild(d2);
    }
    el.appendChild(col);
  }
}

function clearKeys(tId, oId) {
  var tk = document.getElementById(tId).children;
  for (var i = 0; i < tk.length; i++) tk[i].className = tk[i].className.replace(' sel', '');
  var ok = document.getElementById(oId).children;
  for (var i = 0; i < ok.length; i++) ok[i].className = ok[i].className.replace(' sel', '');
}

function updateFreeAnswer() {
  var el = document.getElementById('free-answer');
  var t = freeTens !== null ? freeTens : '-';
  var o = freeOnes !== null ? freeOnes : '-';
  if (freeTens === null && freeOnes === null) { el.innerHTML = ''; return; }
  el.innerHTML = '<span class="num">' + t + '<span class="ones-num">' + o + '</span></span>';
  document.getElementById('free-feedback').textContent = '';
  document.getElementById('free-feedback').className = 'feedback';
}

function setTeacherNum() {
  var v = parseInt(document.getElementById('teacher-num').value);
  if (isNaN(v) || v < 1 || v > 99) {
    document.getElementById('free-prompt').textContent = '請輸入 1–99 之間的數字';
    return;
  }
  freeTarget = v;
  var tens = Math.floor(v / 10), ones = v % 10;
  renderBlocks('free-blocks', tens, ones);
  document.getElementById('free-prompt').textContent = '';
  freeTens = null; freeOnes = null;
  document.getElementById('free-answer').innerHTML = '';
  document.getElementById('free-feedback').textContent = '';
  document.getElementById('free-feedback').className = 'feedback';
  clearKeys('keys-tens', 'keys-ones');
  document.getElementById('teacher-num').value = '';
}

function selectGoal(n, btn) {
  quizGoal = n;
  var btns = document.querySelectorAll('.goal-btn');
  btns.forEach(function(b) { b.className = 'goal-btn'; });
  btn.className = 'goal-btn sel';
}

function startQuiz() {
  quizCorrect = 0;
  document.getElementById('quiz-setup-view').style.display = 'none';
  document.getElementById('quiz-done-view').style.display = 'none';
  document.getElementById('quiz-game-view').style.display = '';
  buildKeys('qkeys-tens', 'tens');
  buildKeys('qkeys-ones', 'ones');
  nextQuestion();
}

function nextQuestion() {
  quizTens = null; quizOnes = null;
  document.getElementById('quiz-answer').innerHTML = '';
  document.getElementById('quiz-feedback').className = 'feedback';
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('ok-btn').disabled = false;
  clearKeys('qkeys-tens', 'qkeys-ones');
  quizTarget = Math.floor(Math.random() * 99) + 1;
  var t = Math.floor(quizTarget / 10), o = quizTarget % 10;
  renderBlocks('quiz-blocks', t, o);
  updateStatus();
}

function updateStatus() {
  document.getElementById('quiz-status').textContent = '已答對 ' + quizCorrect + ' / ' + quizGoal + ' 題';
  document.getElementById('prog-bar').style.width = Math.round(quizCorrect / quizGoal * 100) + '%';
}

function updateQuizAnswer() {
  var el = document.getElementById('quiz-answer');
  var t = quizTens !== null ? quizTens : '-';
  var o = quizOnes !== null ? quizOnes : '-';
  el.innerHTML = '<span class="num">' + t + '<span class="ones-num">' + o + '</span></span>';
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('quiz-feedback').className = 'feedback';
}

function checkAnswer() {
  if (quizTens === null || quizOnes === null) {
    document.getElementById('quiz-feedback').className = 'feedback fb-wrong';
    document.getElementById('quiz-feedback').textContent = '請選擇十位數和個位數！';
    return;
  }
  var ans = quizTens * 10 + quizOnes;
  if (ans === quizTarget) {
    quizCorrect++;
    if (quizCorrect >= quizGoal) { showDone(); return; }
    document.getElementById('quiz-feedback').className = 'feedback fb-right';
    document.getElementById('quiz-feedback').textContent = '答對了！';
    document.getElementById('ok-btn').disabled = true;
    setTimeout(nextQuestion, 900);
  } else {
    document.getElementById('quiz-feedback').className = 'feedback fb-wrong';
    document.getElementById('quiz-feedback').textContent = '再數數看！';
    quizTens = null; quizOnes = null;
    document.getElementById('quiz-answer').innerHTML = '';
    setTimeout(function() { clearKeys('qkeys-tens', 'qkeys-ones'); }, 300);
  }
}

function showDone() {
  document.getElementById('quiz-game-view').style.display = 'none';
  document.getElementById('quiz-done-view').style.display = '';
  document.getElementById('done-score').textContent = quizGoal + ' 題全對！';
  document.getElementById('done-msg').textContent = '太厲害了，全部答對！';
}

function resetQuiz() {
  document.getElementById('quiz-done-view').style.display = 'none';
  document.getElementById('quiz-setup-view').style.display = '';
}

buildKeys('keys-tens', 'tens');
buildKeys('keys-ones', 'ones');
renderBlocks('free-blocks', 0, 0);
</script>
</body>
</html>
